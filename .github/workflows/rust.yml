name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo test --features unicorn,win32-desktop --verbose
    - name: Run tests
      run: cargo test --features unicorn,win32-desktop --verbose
